<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Ultimate Free Hub</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #eee;
  margin: 0;
  padding: 0 20px 20px 220px;
}

header {
  text-align: center;
  padding: 30px 0;
  background: linear-gradient(to right, #8e44ad, #3498db);
  border-radius: 10px;
  margin-bottom: 30px;
}

section {
  background: #1a1a1a;
  padding: 20px;
  margin: 20px 0;
  border-radius: 10px;
  border: 1px solid #444;
}

a {
  color: #1e90ff;
  font-weight: bold;
  cursor: pointer;
}

a:hover {
  color: #ffdd57;
}

.category {
  color: #ffdd57;
}

#sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 200px;
  height: 100%;
  background: #1a1a1a;
  border-right: 1px solid #444;
  padding: 20px 10px;
}

#sidebar a {
  display: block;
  padding: 8px;
  border-radius: 6px;
  color: #eee;
}

#sidebar a:hover {
  background: #333;
  color: #ffdd57;
}

/* Viewer */
#viewer-container {
  display: none;
  position: fixed;
  top: 0;
  left: 200px;
  width: calc(100% - 200px);
  height: 100%;
  background: #000;
  z-index: 999;
}

#viewer-topbar {
  height: 40px;
  background: #111;
  display: flex;
  align-items: center;
  padding: 0 10px;
  border-bottom: 1px solid #444;
}

#viewer-topbar button {
  background: red;
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
}

#viewer-frame {
  width: 100%;
  height: calc(100% - 40px);
  border: none;
}
</style>
</head>

<body>

<div id="sidebar">
  <h3>Navigate</h3>
  <a href="#emulators">Emulators</a>
  <a href="#games">Games</a>
  <a href="#tools">Tools</a>
  <a href="#media">Media</a>
</div>

<header>
  <h1>My Ultimate Free Hub</h1>
  <p>Everything in one place</p>
</header>

<!-- VIEWER -->
<div id="viewer-container">
  <div id="viewer-topbar">
    <button onclick="closeViewer()">Close</button>
  </div>
  <iframe id="viewer-frame"></iframe>
</div>

<section id="games">
<h2>Games</h2>
<ul>
  <li><a onclick="openViewer('https://www.crazygames.com/')">CrazyGames</a></li>
  <li><a onclick="openViewer('https://poki.com/')">Poki</a></li>
  <li><a onclick="openViewer('https://itch.io/games/free/platform-web')">itch.io</a></li>
</ul>
</section>

<section id="tools">
<h2>Tools</h2>
<ul>
  <li><a onclick="openViewer('https://www.canva.com/')">Canva</a></li>
  <li><a onclick="openViewer('https://www.photopea.com/')">Photopea</a></li>
</ul>
</section>

<section id="media">
<h2>Media</h2>
<ul>
  <li><a onclick="openViewer('https://tubitv.com/')">Tubi</a></li>
  <li><a onclick="openViewer('https://pluto.tv/')">Pluto TV</a></li>
</ul>
</section>

<script>
function openViewer(url) {
  const viewer = document.getElementById("viewer-container");
  const frame = document.getElementById("viewer-frame");

  frame.src = url;
  viewer.style.display = "block";

  // fallback if blocked
  setTimeout(() => {
    try {
      if (!frame.contentWindow || frame.contentWindow.location.href === "about:blank") {
        window.open(url, "_blank");
        closeViewer();
      }
    } catch {
      window.open(url, "_blank");
      closeViewer();
    }
  }, 2000);
}

function closeViewer() {
  document.getElementById("viewer-frame").src = "";
  document.getElementById("viewer-container").style.display = "none";
}
</script>

</body>
</html>
